<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Appointments | SevaHealth+</title>

<style>
body{
font-family: Arial;
background:#f4f6f9;
margin:0;
}

nav{
background:#2c3e50;
color:white;
padding:15px 50px;
}

.container{
padding:40px;
text-align:center;
}

.appointment{
background:white;
padding:15px;
margin:10px auto;
width:300px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
background:#4A90E2;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<nav>
<h1>SevaHealth+ | My Appointments</h1>
</nav>

<div class="container">

<h2>Your Booked Appointments</h2>

<div id="appointmentList"></div>

<br>

<a href="index.html">
<button>Back to Home</button>
</a>

</div>

<script>

// Get data from localStorage
let appointments = JSON.parse(localStorage.getItem("appointments")) || [];

let list = document.getElementById("appointmentList");

if(appointments.length === 0){
list.innerHTML = "<p>No appointments booked yet.</p>";
}
else{

appointments.forEach(function(app){

let div = document.createElement("div");

div.className = "appointment";

div.innerHTML =
"Doctor: " + app.doctor + "<br>" +
"Date: " + app.date;

list.appendChild(div);

});

}

</script>

</body>
</html>
