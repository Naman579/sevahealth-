<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Appointment | SevaHealth+</title>

<style>

/* SAME UI */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f6f9;
}

nav{
background:#2c3e50;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav h1{
font-size:22px;
cursor:pointer;
}

/* BACK BUTTON IN NAV */
.back-btn{
background:#e74c3c;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
font-size:14px;
}

.back-btn:hover{
background:#c0392b;
}

.container{
max-width:500px;
background:white;
padding:25px;
margin:40px auto;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.container h2{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input, select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#219150;
}

.success{
color:green;
text-align:center;
margin-top:10px;
}

/* MOBILE */
@media(max-width:768px){

.container{
margin:20px;
padding:20px;
}

}

</style>

</head>

<body>

<nav>

<h1 onclick="window.location.href='index.html'">
SevaHealth+
</h1>

<!-- BACK BUTTON ADDED -->
<button class="back-btn" onclick="goBack()">
← Back
</button>

</nav>

<div class="container">

<h2>Book Appointment</h2>

<form onsubmit="saveAppointment(event)">

<label>Patient Name</label>
<input type="text" id="name" required>

<label>Select Doctor</label>
<select id="doctor" required>

<option value="">Select Doctor</option>
<option>Dr. Sharma</option>
<option>Dr. Patel</option>
<option>Dr. Mehta</option>
<option>Dr. Khan</option>

</select>

<label>Select Date</label>
<input type="date" id="date" required>

<label>Select Time</label>
<input type="time" id="time" required>

<button type="submit">
Book Appointment
</button>

</form>

<div class="success" id="successMsg"></div>

</div>

<script>

/* BACK FUNCTION */
function goBack(){

window.location.href = "index.html";

/* OR use this if you want browser back */
// window.history.back();

}

function saveAppointment(event){

event.preventDefault();

let name =
document.getElementById("name").value;

let doctor =
document.getElementById("doctor").value;

let date =
document.getElementById("date").value;

let time =
document.getElementById("time").value;

let appointments =
JSON.parse(localStorage.getItem("appointments")) || [];

appointments.push({

name: name,
doctor: doctor,
date: date,
time: time

});

localStorage.setItem(
"appointments",
JSON.stringify(appointments)
);

document.getElementById("successMsg").innerHTML =
"✅ Appointment booked successfully!";

document.querySelector("form").reset();

}

</script>

</body>
</html>
