<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointment | SevaHealth+</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f6f9;
}

/* Navbar */
nav{
background:#2c3e50;
color:white;
padding:15px 50px;
}

.container{
background:white;
width:350px;
margin:60px auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
margin-top:10px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

.save-btn{
background:#27ae60;
color:white;
}

.save-btn:hover{
background:#1e8449;
}

.back-btn{
background:#4A90E2;
color:white;
}

.back-btn:hover{
background:#357ABD;
}

.view-btn{
background:#e67e22;
color:white;
}

.view-btn:hover{
background:#ca6f1e;
}
</style>
</head>

<body>

<nav>
<h1>SevaHealth+ | Book Appointment</h1>
</nav>

<div class="container">

<h2>Book New Appointment</h2>

<input type="text" id="doctor" placeholder="Enter Doctor Name">

<input type="date" id="date">

<button class="save-btn" onclick="saveAppointment()">
Save Appointment
</button>

<br><br>

<button class="view-btn" onclick="viewAppointments()">
View My Appointments
</button>

<br><br>

<button class="back-btn" onclick="goHome()">
Back to Home
</button>

</div>

<script>

// Save appointment
function saveAppointment(){

let doctor = document.getElementById("doctor").value;
let date = document.getElementById("date").value;

if(doctor === "" || date === ""){
alert("Please fill all fields");
return;
}

// get existing data
let appointments = JSON.parse(localStorage.getItem("appointments")) || [];

// add new appointment
appointments.push({
doctor: doctor,
date: date
});

// save back
localStorage.setItem("appointments", JSON.stringify(appointments));

alert("Appointment Saved Successfully");

// clear fields
document.getElementById("doctor").value="";
document.getElementById("date").value="";

}

// go to appointments page
function viewAppointments(){

window.location.href="myappointments.html";

}

// go to home
function goHome(){

window.location.href="index.html";

}

</script>

</body>
</html>
