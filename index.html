<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SevaHealth+ | Smart Healthcare</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f6f9;
color:#333;
}

/* NAVBAR */
nav{
background:#2c3e50;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

nav h1{
font-size:22px;
}

nav ul{
list-style:none;
display:flex;
gap:20px;
flex-wrap:wrap;
}

nav ul li{
cursor:pointer;
font-size:16px;
}

nav ul li:hover{
color:#4A90E2;
}

/* HERO */
.hero{
background:linear-gradient(to right,#4A90E2,#357ABD);
color:white;
padding:60px 20px;
text-align:center;
}

.hero h2{
font-size:28px;
margin-bottom:10px;
}

.hero p{
font-size:16px;
margin-bottom:20px;
}

.hero button{
padding:12px 25px;
border:none;
background:white;
color:#357ABD;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

/* FEATURES */
.features{
padding:40px 20px;
text-align:center;
}

.features h2{
margin-bottom:20px;
}

.feature-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.feature-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.feature-card button{
margin-top:10px;
padding:10px 15px;
border:none;
background:#4A90E2;
color:white;
border-radius:5px;
cursor:pointer;
width:100%;
}

/* APPOINTMENTS */
.appointments{
background:white;
padding:40px 20px;
}

.appointment-list{
max-width:600px;
margin:auto;
}

.appointment-item{
background:#f4f6f9;
padding:15px;
border-radius:8px;
margin-bottom:10px;
font-size:14px;
}

.add-btn{
display:block;
margin:20px auto;
padding:12px 20px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
width:200px;
}

/* FOOTER */
footer{
background:#2c3e50;
color:white;
text-align:center;
padding:15px;
font-size:14px;
}

/* MOBILE OPTIMIZATION */
@media(max-width:768px){

nav{
flex-direction:column;
align-items:flex-start;
}

nav ul{
flex-direction:column;
width:100%;
margin-top:10px;
}

nav ul li{
padding:5px 0;
}

.hero{
padding:40px 15px;
}

.hero h2{
font-size:22px;
}

.hero p{
font-size:14px;
}

.feature-card{
padding:15px;
}

.add-btn{
width:100%;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav>

<h1>SevaHealth+</h1>

<ul>

<li onclick="scrollToSection('hero')">Home</li>

<li onclick="scrollToSection('features')">Services</li>

<li onclick="window.location.href='appointment.html'">Appointments</li>

<li onclick="window.location.href='profile.html'">Profile</li>

<li onclick="window.location.href='contact.html'">Contact</li>

</ul>

</nav>

<!-- HERO -->
<section class="hero" id="hero">

<h2>Your Health, Our Priority</h2>

<p>Book appointments and consult doctors online.</p>

<button onclick="window.location.href='appointment.html'">
Book Appointment
</button>

</section>

<!-- FEATURES -->
<section class="features" id="features">

<h2>Our Services</h2>

<div class="feature-grid">

<div class="feature-card">
<h3>📅 Appointment</h3>
<button onclick="window.location.href='appointment.html'">Open</button>
</div>

<div class="feature-card">
<h3>📹 Video Call</h3>
<button onclick="window.location.href='videocall.html'">Start</button>
</div>

<div class="feature-card">
<h3>📄 Prescription</h3>
<button onclick="window.location.href='prescription.html'">View</button>
</div>

<div class="feature-card">
<h3>🧪 Lab Test</h3>
<button onclick="window.location.href='labtest.html'">Book</button>
</div>

</div>

</section>

<!-- FOOTER -->
<footer>

© 2026 SevaHealth+ | Smart Healthcare

</footer>

<script>

function scrollToSection(id){

document.getElementById(id).scrollIntoView({
behavior:"smooth"
});

}

</script>

</body>
</html>
