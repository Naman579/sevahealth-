<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Appointment</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#4A90E2;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Book Appointment</h2>

<input type="text" id="name" placeholder="Enter Your Name">

<input type="text" id="doctor" placeholder="Enter Doctor Name">

<input type="date" id="date">

<input type="time" id="time">

<button onclick="saveAppointment()">Book</button>

</div>

<script>

function saveAppointment(){

let name = document.getElementById("name").value;
let doctor = document.getElementById("doctor").value;
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;

if(name=="" || doctor=="" || date=="" || time==""){
alert("Please fill all fields");
return;
}

let newAppointment={
name:name,
doctor:doctor,
date:date,
time:time
};

let existing = localStorage.getItem("appointments");

let appointments = existing ? JSON.parse(existing) : [];

appointments.push(newAppointment);

localStorage.setItem("appointments", JSON.stringify(appointments));

alert("Appointment Booked Successfully");

window.location.href="index.html";

}

</script>

</body>
</html>
